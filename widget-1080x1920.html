<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1920">
  <title>OBS Boss Widget - 1080x1920</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      color: #00ffcc;
      font-family: 'Courier New', Courier, monospace;
      width: 1080px;
      height: 1920px;
      overflow: hidden;
    }

    /* BOSS DISPLAY - TOP */
    #boss-display {
      position: absolute;
      left: 50%;
      top: 100px;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
      width: 100%;
    }

    #boss-name {
      font-size: 2.8rem;
      color: #ff00ff;
      text-shadow: 0 0 20px #ff00ff, 2px 2px 0 #000;
      margin-bottom: 15px;
      font-weight: bold;
    }

    #boss-image {
      width: 500px;
      height: auto;
      filter: drop-shadow(0 0 40px rgba(255, 0, 255, 0.8));
      user-select: none;
    }

    /* BOSS SHAKE ANIMATION */
    .boss-shake { animation: bigHit 0.2s ease-out; }
    @keyframes bigHit {
      0% { transform: scale(1); filter: drop-shadow(0 0 40px rgba(255, 0, 255, 0.8)); }
      50% { transform: scale(0.97); filter: drop-shadow(0 0 60px rgba(255, 100, 255, 1)) brightness(1.3); }
      100% { transform: scale(1); filter: drop-shadow(0 0 40px rgba(255, 0, 255, 0.8)); }
    }

    #health-bar-container {
      width: 450px;
      height: 40px;
      background: #111;
      border: 3px solid #ff00ff;
      box-shadow: 0 0 20px #ff00ff;
      margin: 20px auto 0;
      position: relative;
    }

    #health-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff00ff, #00ffcc);
      transition: width 0.1s ease-out;
      box-shadow: 0 0 15px #00ffcc;
    }

    #health-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.3rem;
      font-weight: bold;
      color: #fff;
      text-shadow: 2px 2px 0 #000;
      z-index: 5;
    }

    /* DAMAGE INDICATORS - CENTER */
    #damage-zone {
      position: absolute;
      top: 750px;
      left: 50%;
      transform: translateX(-50%);
      width: 95%;
      max-width: 900px;
      max-height: 300px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 20;
    }

    .damage-indicator {
      background: rgba(15, 15, 25, 0.85);
      border: 2px solid #00ffcc;
      border-radius: 6px;
      padding: 10px 14px;
      box-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
      animation: slideIn 0.3s ease-out;
      color: #00ffcc;
      font-size: 1.2rem;
      font-weight: bold;
      text-shadow: 2px 2px 0 #000;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    @keyframes slideIn {
      from {
        transform: translateX(-400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .damage-value {
      color: #ff00ff;
      font-size: 1.3rem;
      margin-left: 10px;
    }

    /* RARE DROPS - BELOW DAMAGE */
    #drops-zone {
      position: absolute;
      top: 1090px;
      left: 50%;
      transform: translateX(-50%);
      width: 95%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 20;
    }

    .drop-notification {
      background: rgba(15, 15, 25, 0.9);
      border: 3px solid #ffd700;
      border-radius: 8px;
      padding: 12px 16px;
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.8);
      animation: dropPulse 0.5s ease-out;
      color: #ffd700;
      font-size: 1.3rem;
      font-weight: bold;
      text-shadow: 3px 3px 0 #000;
      text-align: center;
    }

    @keyframes dropPulse {
      0% {
        transform: scale(0.5);
        opacity: 0;
      }
      50% {
        transform: scale(1.1);
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .drop-item {
      color: #00ffcc;
      font-size: 1.1rem;
      margin-top: 6px;
    }

    /* PLAYER INTERACTION - BOTTOM */
    #players-zone {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 95%;
      max-width: 900px;
      max-height: 250px;
      overflow-y: auto;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      z-index: 20;
    }

    .player-card {
      background: rgba(15, 15, 25, 0.9);
      border: 2px solid #00ffcc;
      border-radius: 6px;
      padding: 8px 12px;
      animation: playerPop 0.4s ease-out;
      color: #00ffcc;
      font-size: 1rem;
      text-shadow: 2px 2px 0 #000;
      box-shadow: 0 0 15px rgba(0, 255, 204, 0.5);
      white-space: nowrap;
    }

    .player-name {
      font-weight: bold;
      color: #ff00ff;
    }

    @keyframes playerPop {
      0% {
        transform: scale(0) rotate(-10deg);
        opacity: 0;
      }
      60% {
        transform: scale(1.1);
      }
      100% {
        transform: scale(1) rotate(0);
        opacity: 1;
      }
    }

    /* FLOATING EMOJI POPUPS */
    .floating-emote {
      position: fixed;
      pointer-events: none;
      font-weight: 900;
      z-index: 9999;
      text-shadow: 3px 3px 0 #000;
      white-space: nowrap;
      font-size: 2rem;
    }

    .animate-float {
      animation: floatUp 2s ease-out forwards;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(-200px) rotate(var(--rot));
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div id="boss-display">
    <h1 id="boss-name">CLEANING MANAGER JIM</h1>
    <img id="boss-image" src="cleanerjim.png" alt="Cleaning Manager Jim">
    <div id="health-bar-container">
      <div id="health-bar-fill"></div>
      <span id="health-text">Connecting...</span>
    </div>
  </div>

  <div id="damage-zone"></div>
  <div id="drops-zone"></div>
  <div id="players-zone"></div>

  <script src="widget.js"></script>
</body>
</html>
