<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>OBS Boss Widget - 1920x1080</title>

  <script>
    function addLog(msg) {
      const log = document.getElementById('debug-log');
      if (log) log.innerHTML += '<div>' + msg + '</div>';
      console.log(msg);
    }
  </script>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js" onload="addLog('✓ Firebase App loaded')" onerror="addLog('❌ Firebase App failed to load')"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js" onload="addLog('✓ Firebase DB loaded')" onerror="addLog('❌ Firebase DB failed to load')"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a0033;
      color: #00ffcc;
      font-family: 'Courier New', Courier, monospace;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* BOSS DISPLAY - CENTER */
    #boss-display {
      text-align: center;
      z-index: 10;
    }

    #boss-name {
      font-size: 3.5rem;
      color: #ff00ff;
      text-shadow: 0 0 20px #ff00ff, 2px 2px 0 #000;
      margin-bottom: 20px;
      font-weight: bold;
    }

    #boss-image {
      width: 700px;
      height: auto;
      filter: drop-shadow(0 0 40px rgba(255, 0, 255, 0.8));
      user-select: none;
    }

    /* BOSS SHAKE ANIMATION */
    .boss-shake { animation: bigHit 0.2s ease-out; }
    @keyframes bigHit {
      0% { transform: scale(1); filter: drop-shadow(0 0 40px rgba(255, 0, 255, 0.8)); }
      50% { transform: scale(0.97); filter: drop-shadow(0 0 60px rgba(255, 100, 255, 1)) brightness(1.3); }
      100% { transform: scale(1); filter: drop-shadow(0 0 40px rgba(255, 0, 255, 0.8)); }
    }

    #health-bar-container {
      width: 600px;
      height: 50px;
      background: #111;
      border: 3px solid #ff00ff;
      box-shadow: 0 0 20px #ff00ff;
      margin-top: 30px;
      position: relative;
    }

    #health-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff00ff, #00ffcc);
      transition: width 0.1s ease-out;
      box-shadow: 0 0 15px #00ffcc;
    }

    #health-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.8rem;
      font-weight: bold;
      color: #fff;
      text-shadow: 2px 2px 0 #000;
      z-index: 5;
    }

    /* DAMAGE INDICATORS - LEFT SIDE */
    #damage-zone {
      position: absolute;
      left: 50px;
      top: 100px;
      width: 400px;
      height: 600px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 20;
    }

    .damage-indicator {
      background: rgba(15, 15, 25, 0.85);
      border: 2px solid #00ffcc;
      border-radius: 8px;
      padding: 12px 16px;
      box-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
      animation: slideIn 0.3s ease-out;
      color: #00ffcc;
      font-size: 1.4rem;
      font-weight: bold;
      text-shadow: 2px 2px 0 #000;
    }

    @keyframes slideIn {
      from {
        transform: translateX(-300px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .damage-value {
      color: #ff00ff;
      font-size: 1.6rem;
      margin-left: 10px;
    }

    /* RARE DROPS - RIGHT SIDE */
    #drops-zone {
      position: absolute;
      right: 50px;
      top: 100px;
      width: 400px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 20;
    }

    .drop-notification {
      background: rgba(15, 15, 25, 0.9);
      border: 3px solid #ffd700;
      border-radius: 10px;
      padding: 15px 20px;
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.8);
      animation: dropPulse 0.5s ease-out;
      color: #ffd700;
      font-size: 1.5rem;
      font-weight: bold;
      text-shadow: 3px 3px 0 #000;
      text-align: center;
    }

    @keyframes dropPulse {
      0% {
        transform: scale(0.5);
        opacity: 0;
      }
      50% {
        transform: scale(1.1);
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .drop-item {
      color: #00ffcc;
      font-size: 1.3rem;
      margin-top: 8px;
    }

    /* PLAYER INTERACTION - BOTTOM */
    #players-zone {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      max-width: 1200px;
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
      z-index: 20;
    }

    .player-card {
      background: rgba(15, 15, 25, 0.9);
      border: 2px solid #00ffcc;
      border-radius: 8px;
      padding: 12px 16px;
      animation: playerPop 0.4s ease-out;
      color: #00ffcc;
      font-size: 1.2rem;
      text-shadow: 2px 2px 0 #000;
      box-shadow: 0 0 15px rgba(0, 255, 204, 0.5);
    }

    .player-name {
      font-weight: bold;
      color: #ff00ff;
    }

    @keyframes playerPop {
      0% {
        transform: scale(0) rotate(-10deg);
        opacity: 0;
      }
      60% {
        transform: scale(1.1);
      }
      100% {
        transform: scale(1) rotate(0);
        opacity: 1;
      }
    }

    /* FLOATING EMOJI POPUPS */
    .floating-emote {
      position: fixed;
      pointer-events: none;
      font-weight: 900;
      z-index: 9999;
      text-shadow: 3px 3px 0 #000;
      white-space: nowrap;
      font-size: 2.5rem;
    }

    .animate-float {
      animation: floatUp 2s ease-out forwards;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(-200px) rotate(var(--rot));
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div style="position: absolute; top: 10px; left: 10px; color: #00ff00; font-size: 1rem; background: rgba(0, 0, 0, 0.95); padding: 15px; border: 2px solid #00ff00; z-index: 9999; max-width: 400px; overflow-y: auto; max-height: 300px;">
    <div id="debug-log">✓ HTML LOADED</div>
  </div>

  <script>
    window.addEventListener('error', (e) => {
      addLog('❌ ERROR: ' + e.message);
    });
    addLog('✓ Ready');
  </script>

  <div id="boss-display">
    <h1 id="boss-name">CLEANING MANAGER JIM</h1>
    <img id="boss-image" src="cleanerjim.png" alt="Cleaning Manager Jim">
    <div id="health-bar-container">
      <div id="health-bar-fill" style="width: 100%;"></div>
      <span id="health-text">Connecting to stream...</span>
    </div>
  </div>

  <div style="position: absolute; top: 20px; left: 20px; color: #00ffcc; font-size: 1.2rem; text-shadow: 2px 2px 0 #000;">
    <div id="status" style="color: #ff00ff;">● LOADING...</div>
  </div>

  <div id="damage-zone"></div>
  <div id="drops-zone"></div>
  <div id="players-zone"></div>

  <script src="widget.js"></script>
</body>
</html>
